[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py collectstatic --noinput || true && python manage.py migrate --noinput || true && gunicorn spss_online.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-file -"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
