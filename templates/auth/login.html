{% extends 'auth/base_auth.html' %}
{% block content %}
<h2 class="auth-title">Masuk ke Akun</h2>
<p class="auth-subtitle">Selamat datang kembali. Silakan login untuk melanjutkan.</p>

{% if form.errors %}
<div class="error-list">
    Username atau password salah. Silakan coba lagi.
</div>
{% endif %}

<form method="post" id="login-form">
    {% csrf_token %}
    <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" placeholder="Masukkan username" autocomplete="username" required>
    </div>
    <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" placeholder="Masukkan password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-primary" id="login-btn">
        🔐 Masuk
    </button>
</form>

<div class="auth-link">
    Belum punya akun? <a href="{% url 'register' %}">Daftar sekarang</a>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function() {
    const btn = document.getElementById('login-btn');
    btn.textContent = '⏳ Masuk...';
    btn.disabled = true;
});
</script>
{% endblock %}
